<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Agri AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <h1 class="brand-title">Join Agri AI</h1>
            <p class="subtitle">Create an account to protect your crops</p>
            
            {% if error %}
            <div class="alert error">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('signup') }}" method="POST" class="auth-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn primary-btn btn-animate">Sign Up</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
        </div>
    </div>
</body>
</html>
